name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: [self-hosted, windows]
    env:
      PIP_CACHE_DIR: ${{ github.workspace }}\.pip-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Cache Inno Setup
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Inno Setup 6
          key: innosetup-${{ runner.os }}

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: |
            build
            output
          key: build-${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt


      - name: Build EXEs
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gg-hardware-mixer-windows
          path: |
            dist/GGHardwareServer.exe
            dist/GGHardwareWeb.exe
            dist/GGHardwareMixer-Setup.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GGHardwareServer.exe
            dist/GGHardwareWeb.exe
            dist/GGHardwareMixer-Setup.exe
